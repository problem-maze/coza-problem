<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Problem — The Maze Eye</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,600&family=DM+Mono:wght@400&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    width:100%;height:100%;
    background:#040608;
    overflow:hidden;
  }

  .stage{
    position:relative;
    width:100vw;height:100dvh;
    background:
      radial-gradient(ellipse 120vw 60vh at 50% 4%, rgba(225,235,248,0.05), transparent 60%),
      #040608;
    overflow:hidden;
    font-family:'Cormorant Garamond',serif;
  }

  /* ── starfield ── */
  .stars{position:absolute;inset:0}
  .star{position:absolute;background:rgba(225,235,248,0.85);border-radius:50%;animation:twinkle var(--d,5s) ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}

  /* ── the planet — layered gradients + turbulence noise for real depth,
        kept in-brand monochrome ice/cyan rather than a literal photo ── */
  .sphere-wrap{
    position:absolute;
    left:50%; top:64vh;
    width:140vw; height:140vw;
    max-width:1600px; max-height:1600px;
    margin-left:-70vw;
    border-radius:50%;
    overflow:hidden;
    transform:translateZ(0);
  }
  @media (min-width:900px){
    .sphere-wrap{ width:1900px;height:1900px;margin-left:-950px; left:50%; top:620px; bottom:auto; }
  }
  .sphere-base{
    position:absolute; inset:0; border-radius:50%;
    background:
      radial-gradient(circle at 36% 16%, #eef5ff 0%, #c9dcf3 5%, #7f9ec9 13%, #3c5478 24%, #16243a 42%, #060a12 64%, #020305 80%);
  }
  .sphere-noise{
    position:absolute; inset:0; border-radius:50%;
    mix-blend-mode:overlay;
    opacity:0.55;
  }
  .sphere-terrain{
    position:absolute; inset:0; border-radius:50%;
    mix-blend-mode:soft-light;
    opacity:0.85;
  }
  .sphere-shade{
    /* night-side falloff so it reads as a sphere, not a disc */
    position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle at 34% 14%, transparent 0%, transparent 30%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,0.93) 78%);
  }
  .sphere-rim{
    position:absolute; inset:0; border-radius:50%;
    box-shadow:
      inset 0 0 0 1px rgba(225,235,248,0.14),
      0 0 120px 10px rgba(150,190,255,0.10);
    pointer-events:none;
  }
  .sphere-atmo{
    position:absolute; inset:-3%; border-radius:50%;
    background:radial-gradient(circle at 36% 16%, rgba(190,220,255,0.45) 0%, rgba(140,180,255,0.18) 25%, transparent 52%);
    filter:blur(6px);
    pointer-events:none;
  }

  /* ── wordmark ── */
  .word-stack{
    position:absolute; left:0; right:0; top:18vh;
    display:flex; flex-direction:column; align-items:center;
    z-index:3; padding:0 6vw; text-align:center;
  }
  .eyebrow{
    font-family:'DM Mono',monospace;
    font-size:clamp(9px,1.6vw,13px); letter-spacing:0.35em; text-transform:uppercase;
    color:rgba(150,165,190,0.75);
    margin-bottom:clamp(10px,2.4vh,22px);
    white-space:nowrap;
  }
  .wordmark{
    font-size:clamp(48px,13vw,128px); font-weight:500; line-height:1;
    letter-spacing:-0.02em;
    color:rgba(225,235,248,0.97);
    text-shadow:0 0 60px rgba(190,215,255,0.25);
  }
  .wordmark em{
    font-style:italic; font-weight:600;
    color:rgba(232,242,255,1);
  }
  .subline{
    margin-top:clamp(8px,1.8vh,18px);
    font-family:'DM Mono',monospace;
    font-size:clamp(9px,1.8vw,14px); letter-spacing:0.4em; text-transform:uppercase;
    color:rgba(150,165,190,0.6);
  }

  /* ── signature eye mark, where the AWS arrow sits ── */
  .eye-mark{
    position:absolute; left:50%; top:46vh;
    width:clamp(140px,26vw,320px);
    transform:translateX(-50%);
    z-index:3;
    filter:drop-shadow(0 0 30px rgba(190,220,255,0.5)) drop-shadow(0 0 80px rgba(140,180,255,0.22));
  }
  .eye-mark svg{width:100%; height:auto; display:block}
  .ne-lid{fill:none; stroke:rgba(225,235,248,0.95); stroke-width:1.4; stroke-linecap:round}
  .ne-maze-ring{fill:none; stroke-width:0.5}
  .ne-gap{fill:none; stroke:#040608; stroke-linecap:round}
  .ne-solve{fill:none; stroke:rgba(232,242,255,0.9); stroke-width:0.55; stroke-linecap:round; stroke-linejoin:round}
  .ne-pupil{fill:rgba(232,242,255,1)}
  .ne-catch{fill:rgba(255,255,255,0.95)}
  .ne-glow{fill:rgba(180,210,255,0.12)}

</style>
</head>
<body>

<div class="stage" id="stage">

  <div class="stars" id="stars"></div>

  <div class="sphere-wrap">
    <div class="sphere-base"></div>
    <svg class="sphere-noise" width="100%" height="100%" style="position:absolute;inset:0">
      <filter id="terrainNoise">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="5" seed="7" result="n"/>
        <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.85  0 0 0 0 0.91  0 0 0 0 0.98  0 0 0 0.5 0"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#terrainNoise)"/>
    </svg>
    <svg class="sphere-terrain" width="100%" height="100%" style="position:absolute;inset:0">
      <filter id="terrainNoise2">
        <feTurbulence type="fractalNoise" baseFrequency="0.004 0.006" numOctaves="4" seed="42" result="n2"/>
        <feColorMatrix in="n2" type="matrix" values="0 0 0 0 0.05  0 0 0 0 0.08  0 0 0 0 0.14  0 0 0 0.65 0"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#terrainNoise2)"/>
    </svg>
    <div class="sphere-shade"></div>
    <div class="sphere-rim"></div>
    <div class="sphere-atmo"></div>
  </div>

  <div class="word-stack">
    <div class="eyebrow">For every mind inside a maze</div>
    <div class="wordmark"><em>P</em>roblem</div>
    <div class="subline">The Maze Eye</div>
  </div>

  <div class="eye-mark">
    <svg viewBox="0 0 32 22" fill="none">
      <path class="ne-lid" d="M 1 11 Q 16 1, 31 11"/>
      <path class="ne-lid" d="M 1 11 Q 16 21, 31 11"/>
      <g transform="translate(16,11)">
        <circle class="ne-glow" cx="0" cy="0" r="7.5"/>
        <circle cx="0" cy="0" r="5.5" class="ne-maze-ring" style="stroke:rgba(232,242,255,0.30)"/>
        <circle cx="0" cy="0" r="4"   class="ne-maze-ring" style="stroke:rgba(232,242,255,0.22)"/>
        <circle cx="0" cy="0" r="2.6" class="ne-maze-ring" style="stroke:rgba(232,242,255,0.16)"/>
        <circle cx="0" cy="0" r="1.4" class="ne-maze-ring" style="stroke:rgba(232,242,255,0.12)"/>
        <line x1="0" y1="-5.5" x2="0" y2="-4" stroke="rgba(232,242,255,0.12)" stroke-width="0.4"/>
        <line x1="3.5" y1="-2.5" x2="2.5" y2="-1.8" stroke="rgba(232,242,255,0.1)" stroke-width="0.4"/>
        <line x1="-4" y1="0" x2="-2.6" y2="0" stroke="rgba(232,242,255,0.1)" stroke-width="0.4"/>
        <line x1="1.8" y1="3.6" x2="1.3" y2="2.3" stroke="rgba(232,242,255,0.09)" stroke-width="0.4"/>
        <path d="M -1.2,-5.5 A 5.5,5.5 0 0,1 1.2,-5.5" class="ne-gap" stroke-width="1.2"/>
        <path d="M 4,-1 A 4,4 0 0,1 4,1" class="ne-gap" stroke-width="1.1"/>
        <path d="M -0.8,2.6 A 2.6,2.6 0 0,1 0.8,2.6" class="ne-gap" stroke-width="1"/>
        <path d="M -1.4,-0.5 A 1.4,1.4 0 0,1 -1.4,0.5" class="ne-gap" stroke-width="0.9"/>
        <path class="ne-solve" d="M 0,-5.5 L 0,-4 Q 3,-3.5 4,0 L 2.6,0 Q 1.5,2 0,2.6 L 0,1.4 Q -1.4,1 -1.4,0 L -0.7,0 L 0,0"/>
        <circle class="ne-pupil" cx="0" cy="0" r="0.9"/>
        <circle class="ne-catch" cx="0.95" cy="-0.95" r="0.4"/>
      </g>
    </svg>
  </div>

</div>

<script>
  const starsEl = document.getElementById('stars');
  const W = 100, H = 55; // percent-based, above the sphere
  let html = '';
  for (let i = 0; i < 160; i++) {
    const x = (i * 53 % W) + (i % 7) * 0.3;
    const y = (i * 31 % H);
    const s = (i % 5 === 0) ? 2.2 : 1.1;
    const d = 3 + (i % 6);
    html += `<div class="star" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;--d:${d}s"></div>`;
  }
  starsEl.innerHTML = html;
</script>

</body>
</html>
