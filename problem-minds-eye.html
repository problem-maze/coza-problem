<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Problem — The Mind's Eye</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,600&family=DM+Mono:wght@400&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#040608;overflow:hidden}

  .stage{
    position:relative;
    width:100vw; height:100dvh;
    background:
      radial-gradient(ellipse 60vw 55vh at 50% 42%, rgba(80,120,190,0.18), transparent 65%),
      #040608;
    overflow:hidden;
    font-family:'Cormorant Garamond',serif;
  }

  .stars{position:absolute;inset:0}
  .star{position:absolute;background:rgba(225,235,248,0.85);border-radius:50%;animation:twinkle var(--d,5s) ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}

  .bust-wrap{
    position:absolute; left:50%; top:46%;
    width:min(64vw,64vh); height:min(74.6vw,74.6vh);
    transform:translate(-50%,-50%);
  }
  .bust-fill{fill:#070c16}
  .bust-outline{fill:none; stroke:rgba(225,235,248,0.5); stroke-width:1.4}
  .ring{fill:none; stroke:rgba(225,235,248,0.32)}
  .wall{stroke:rgba(225,235,248,0.4); stroke-linecap:round}
  .gap{fill:none; stroke:#070c16; stroke-linecap:round}
  .solve{
    fill:none; stroke:rgba(232,242,255,0.96); stroke-linecap:round; stroke-linejoin:round;
    filter:drop-shadow(0 0 5px rgba(190,220,255,0.9)) drop-shadow(0 0 16px rgba(150,195,255,0.6));
  }
  .pupil{fill:rgba(232,242,255,1); filter:drop-shadow(0 0 8px rgba(190,220,255,1))}
  .catch{fill:#fff}
  .lid{fill:none; stroke:rgba(228,238,250,0.97); stroke-width:2.4; stroke-linecap:round}

  .brand{
    position:absolute; top:6vh; left:0; right:0;
    display:flex; align-items:center; justify-content:center;
    z-index:3;
  }
  .brand-word{
    font-size:clamp(16px,2.6vw,22px); font-weight:500;
    color:rgba(225,235,248,0.85);
  }
  .brand-word em{font-style:italic; font-weight:600; color:#fff}

  .word-stack{
    position:absolute; left:0; right:0; bottom:7vh;
    display:flex; flex-direction:column; align-items:center;
    z-index:3; padding:0 8vw; text-align:center;
  }
  .headline{
    font-size:clamp(26px,5.4vw,46px); font-weight:500; line-height:1.15;
    color:rgba(228,238,250,0.98);
    text-shadow:0 0 40px rgba(170,205,255,0.25);
  }
  .headline em{font-style:italic; font-weight:600}
  .sub{
    margin-top:14px;
    font-family:'DM Mono',monospace;
    font-size:clamp(9px,1.8vw,13px); letter-spacing:0.35em; text-transform:uppercase;
    color:rgba(150,165,190,0.7);
  }
</style>
</head>
<body>

<div class="stage">
  <div class="stars" id="stars"></div>

  <div class="brand">
    <span class="brand-word"><em>P</em>roblem</span>
  </div>

  <div class="bust-wrap">
    <svg viewBox="0 0 240 280" width="100%" height="100%">
      <path class="bust-fill" d="M120,8
               C85,8 55,35 52,75
               C50,100 55,125 65,145
               C70,155 78,162 88,167
               L82,185
               C60,195 35,215 25,250
               L25,280 L215,280 L215,250
               C205,215 180,195 158,185
               L152,167
               C162,162 170,155 175,145
               C185,125 190,100 188,75
               C185,35 155,8 120,8 Z"/>

      <!-- the brand's own maze, scaled up, filling the mind -->
      <g transform="translate(120,90)">
        <circle class="ring" cx="0" cy="0" r="62" stroke-width="1"/>
        <circle class="ring" cx="0" cy="0" r="46" stroke-width="1"/>
        <circle class="ring" cx="0" cy="0" r="31" stroke-width="0.9"/>
        <circle class="ring" cx="0" cy="0" r="17" stroke-width="0.8"/>

        <g class="wall" stroke-width="1">
          <line x1="0" y1="-62" x2="0" y2="-46"/>
          <line x1="43" y1="-31" x2="32" y2="-23"/>
          <line x1="62" y1="0" x2="46" y2="0"/>
          <line x1="43" y1="31" x2="32" y2="23"/>
          <line x1="0" y1="62" x2="0" y2="46"/>
          <line x1="-43" y1="31" x2="-32" y2="23"/>
          <line x1="-62" y1="0" x2="-46" y2="0"/>
          <line x1="-43" y1="-31" x2="-32" y2="-23"/>
          <line x1="22" y1="-43" x2="15" y2="-29"/>
          <line x1="-22" y1="43" x2="-15" y2="29"/>
          <line x1="29" y1="15" x2="20" y2="10"/>
          <line x1="-29" y1="-15" x2="-20" y2="-10"/>
        </g>

        <path class="gap" d="M-9,-30.5 A31,31 0 0,1 9,-30.5" stroke-width="3.4"/>
        <path class="gap" d="M44,-7 A46,46 0 0,1 44,7" stroke-width="3.6"/>
        <path class="gap" d="M-13,-60.5 A62,62 0 0,1 13,-60.5" stroke-width="3.8"/>
        <path class="gap" d="M-6,16.5 A17,17 0 0,0 6,16.5" stroke-width="3"/>

        <path class="solve" pathLength="100" stroke-width="1.6"
          d="M0,-62 L0,-46 Q24,-42 31,-22 L17,-17 Q10,-2 0,0 L0,-17
             Q-10,-22 -10,-31 L0,-31"/>

        <g>
          <path class="lid" d="M-15,0 Q0,-10 16,0"/>
          <path class="lid" d="M-15,0 Q0,10 16,0"/>
          <circle class="pupil" cx="0" cy="0" r="3.8"/>
          <circle class="catch" cx="1.5" cy="-1.6" r="1.3"/>
        </g>
      </g>

      <path class="bust-outline" d="M120,8
               C85,8 55,35 52,75
               C50,100 55,125 65,145
               C70,155 78,162 88,167
               L82,185
               C60,195 35,215 25,250
               L25,280 L215,280 L215,250
               C205,215 180,195 158,185
               L152,167
               C162,162 170,155 175,145
               C185,125 190,100 188,75
               C185,35 155,8 120,8 Z"/>
    </svg>
  </div>

  <div class="word-stack">
    <div class="headline">Every mind has a <em>way out</em>.</div>
    <div class="sub">We help you see it</div>
  </div>

</div>

<script>
  const starsEl = document.getElementById('stars');
  let html = '';
  for (let i = 0; i < 90; i++) {
    const x = (i * 53 % 100);
    const y = (i * 31 % 100);
    const s = (i % 5 === 0) ? 2.2 : 1.1;
    const d = 3 + (i % 6);
    html += `<div class="star" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;--d:${d}s"></div>`;
  }
  starsEl.innerHTML = html;
</script>

</body>
</html>
