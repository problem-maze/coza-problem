<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Problem — Inside the Maze</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,600&family=DM+Mono:wght@400&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#020305;overflow:hidden}

  .stage{
    position:relative;
    width:100vw; height:100dvh;
    background:#020305;
    overflow:hidden;
    font-family:'Cormorant Garamond',serif;
  }

  .stars{position:absolute;inset:0;opacity:0.5}
  .star{position:absolute;background:rgba(225,235,248,0.85);border-radius:50%;animation:twinkle var(--d,5s) ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.8}}

  /* ── the corridor: a 3D perspective tunnel of maze-wall frames,
        receding toward the eye at the vanishing point — you are
        standing inside the maze, not looking at it from outside ── */
  .scene{
    position:absolute; inset:0;
    perspective:340px;
    perspective-origin:50% 46%;
  }
  .tunnel{
    position:absolute; left:50%; top:46%;
    width:0; height:0;
    transform-style:preserve-3d;
  }
  .frame{
    position:absolute;
    border:2px solid rgba(190,210,240,var(--op,0.5));
    transform-style:preserve-3d;
  }
  .frame::before{
    /* subtle corner ticks, like the maze's gap/wall language, at each frame */
    content:'';
  }

  .glow-point{
    position:absolute; left:50%; top:46%;
    width:14vmin; height:14vmin;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle, rgba(225,238,255,0.95) 0%, rgba(170,205,255,0.5) 35%, transparent 72%);
    filter:blur(2px);
    z-index:2;
  }

  .eye-mark{
    position:absolute; left:50%; top:46%;
    width:9vmin;
    transform:translate(-50%,-50%);
    z-index:3;
    filter:drop-shadow(0 0 10px rgba(190,220,255,0.9)) drop-shadow(0 0 22px rgba(150,195,255,0.6));
  }
  .eye-mark svg{width:100%; height:auto; display:block}
  .lid{fill:none; stroke:rgba(225,235,248,0.95); stroke-width:2.4; stroke-linecap:round}
  .pupil{fill:rgba(20,26,38,0.9)}

  .floor-glow{
    position:absolute; left:0; right:0; bottom:0; height:34vh;
    background:linear-gradient(to top, #020305 5%, rgba(2,3,5,0.85) 35%, transparent 100%);
    pointer-events:none; z-index:1;
  }
  .top-fade{
    position:absolute; left:0; right:0; top:0; height:16vh;
    background:linear-gradient(to bottom, #020305 10%, transparent 100%);
    pointer-events:none; z-index:1;
  }

  .brand{
    position:absolute; top:6vh; left:0; right:0;
    display:flex; align-items:center; justify-content:center;
    z-index:4;
  }
  .brand-word{ font-size:clamp(16px,2.6vw,22px); font-weight:500; color:rgba(225,235,248,0.88);
    text-shadow:0 0 20px rgba(0,0,0,0.8)}
  .brand-word em{font-style:italic; font-weight:600; color:#fff}

  .word-stack{
    position:absolute; left:0; right:0; bottom:7vh;
    display:flex; flex-direction:column; align-items:center;
    z-index:4; padding:0 8vw; text-align:center;
  }
  .headline{
    font-size:clamp(26px,5.4vw,46px); font-weight:500; line-height:1.15;
    color:rgba(228,238,250,0.98);
    text-shadow:0 0 30px rgba(0,0,0,0.9), 0 0 50px rgba(170,205,255,0.3);
  }
  .headline em{font-style:italic; font-weight:600}
  .sub{
    margin-top:14px;
    font-family:'DM Mono',monospace;
    font-size:clamp(9px,1.8vw,13px); letter-spacing:0.35em; text-transform:uppercase;
    color:rgba(170,185,205,0.78);
    text-shadow:0 0 14px rgba(0,0,0,0.9);
  }
</style>
</head>
<body>

<div class="stage">
  <div class="stars" id="stars"></div>

  <div class="scene">
    <div class="tunnel" id="tunnel"></div>
  </div>

  <div class="floor-glow"></div>
  <div class="top-fade"></div>
  <div class="glow-point"></div>
  <div class="eye-mark">
    <svg viewBox="0 0 32 22" fill="none">
      <path class="lid" d="M 1 11 Q 16 1, 31 11"/>
      <path class="lid" d="M 1 11 Q 16 21, 31 11"/>
      <circle class="pupil" cx="16" cy="11" r="3.2"/>
    </svg>
  </div>

  <div class="brand">
    <span class="brand-word"><em>P</em>roblem</span>
  </div>

  <div class="word-stack">
    <div class="headline">You're not lost.<br>You're just <em>inside it</em>.</div>
    <div class="sub">Problem — The Maze Eye</div>
  </div>

</div>

<script>
  const tunnel = document.getElementById('tunnel');
  const N = 12;
  let html = '';
  for (let i = 0; i < N; i++) {
    const depth = -(i * 70);
    const w = 1400, h = 900;
    const wobbleX = Math.sin(i * 0.8) * 110;
    const wobbleY = Math.cos(i * 0.7) * 56;
    const rot = Math.sin(i * 0.8) * 5;
    const op = Math.max(0.1, 0.65 - i * 0.045);
    html += `<div class="frame" style="
      width:${w}px; height:${h}px;
      margin-left:${-w/2 + wobbleX}px; margin-top:${-h/2 + wobbleY}px;
      transform: translateZ(${depth}px) rotate(${rot}deg);
      --op:${op};
    "></div>`;
  }
  tunnel.innerHTML = html;

  const starsEl = document.getElementById('stars');
  let shtml = '';
  for (let i = 0; i < 70; i++) {
    const x = (i * 53 % 100);
    const y = (i * 31 % 60);
    const s = (i % 5 === 0) ? 2 : 1;
    const d = 3 + (i % 6);
    shtml += `<div class="star" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;--d:${d}s"></div>`;
  }
  starsEl.innerHTML = shtml;
</script>

</body>
</html>
